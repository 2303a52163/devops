<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAPRS Ecommerce</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#060912;--sidebar:#0b1120;--card:#0f1a2e;--card2:#111d33;
  --border:#1a2d4a;--cyan:#00e5ff;--violet:#7c3aed;--green:#00f5a0;
  --pink:#ff4d8f;--orange:#ff7c3a;--text:#e2eaff;--muted:#5a7298;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* AUTH */
.auth-wrap{display:flex;height:100vh;background:var(--bg);position:relative;overflow:hidden;}
.auth-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 60% 40%,rgba(0,229,255,.07),transparent),radial-gradient(ellipse 50% 50% at 20% 80%,rgba(124,58,237,.08),transparent);pointer-events:none;}
.auth-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,229,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.04) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;}
.auth-left{width:50%;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;}
.auth-brand .big{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.auth-brand .sub{color:var(--muted);font-size:15px;margin-top:10px;letter-spacing:2px;text-transform:uppercase;}
.auth-brand .tagline{color:var(--text);font-size:13px;margin-top:20px;opacity:.6;max-width:260px;}
.auth-right{width:50%;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;}
.auth-card{background:rgba(15,26,46,.8);backdrop-filter:blur(30px);border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:400px;box-shadow:0 0 60px rgba(0,229,255,.06);animation:fadeIn .5s ease;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.field input{width:100%;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;transition:border .2s,box-shadow .2s;outline:none;}
.field input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,229,255,.08);}
.field input::placeholder{color:var(--muted);}
.btn-primary{width:100%;padding:13px;background:linear-gradient(90deg,var(--cyan),var(--violet));border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;}
.btn-primary:hover{opacity:.9;} .btn-primary:active{transform:scale(.98);}
.auth-switch{text-align:center;margin-top:20px;font-size:13px;color:var(--muted);}
.auth-switch span{color:var(--cyan);cursor:pointer;font-weight:500;}

/* APP */
.app{display:flex;height:100vh;animation:fadeIn .4s ease;}
.sidebar{width:230px;min-width:230px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0 0 20px;}
.sidebar-logo{padding:28px 24px 24px;border-bottom:1px solid var(--border);}
.sidebar-logo .logo-name{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;background:linear-gradient(90deg,var(--cyan),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sidebar-logo .logo-tag{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.nav-group{flex:1;padding:16px 12px;}
.nav-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;padding:0 12px;margin-bottom:8px;margin-top:14px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;cursor:pointer;font-size:13.5px;font-weight:500;color:var(--muted);transition:all .2s;margin-bottom:2px;}
.nav-item:hover{background:rgba(0,229,255,.06);color:var(--text);}
.nav-item.active{background:linear-gradient(90deg,rgba(0,229,255,.12),rgba(124,58,237,.08));color:var(--cyan);border-left:2px solid var(--cyan);}
.nav-item .icon{font-size:16px;width:20px;text-align:center;}
.nav-item .badge{margin-left:auto;background:var(--pink);color:#fff;font-size:10px;padding:2px 6px;border-radius:20px;}
.nav-logout{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;cursor:pointer;font-size:13.5px;font-weight:500;color:var(--pink);transition:all .2s;margin-top:4px;}
.nav-logout:hover{background:rgba(255,77,143,.08);}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);}
.user-pill{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.03);cursor:pointer;}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--violet));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.user-info .name{font-size:12.5px;font-weight:600;color:var(--text);}
.user-info .role{font-size:11px;color:var(--muted);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:rgba(6,9,18,.8);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);}
.page-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;}
.page-title span{color:var(--muted);font-weight:400;font-size:13px;margin-left:10px;font-family:'DM Sans',sans-serif;}
.topbar-right{display:flex;align-items:center;gap:14px;}
.search-box{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:8px 14px;}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;width:160px;}
.search-box input::placeholder{color:var(--muted);}
.icon-btn{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .2s;}
.icon-btn:hover{background:rgba(0,229,255,.08);border-color:var(--cyan);}
.content{flex:1;overflow-y:auto;padding:28px 32px;}

/* COMPONENTS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:24px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;animation:slideUp .55s cubic-bezier(0.22,1,0.36,1) both;}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3);}
@keyframes slideUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
.stat-card:nth-child(1){animation-delay:.04s;} .stat-card:nth-child(2){animation-delay:.10s;} .stat-card:nth-child(3){animation-delay:.16s;} .stat-card:nth-child(4){animation-delay:.22s;}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:14px;}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.stat-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;}
.stat-change{font-size:11.5px;margin-top:4px;}
.stat-change.up{color:var(--green);} .stat-change.down{color:var(--pink);}
.stat-glow{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.12;filter:blur(20px);}

.row-2{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;margin-bottom:24px;}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:24px;}
.panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;animation:slideUp .55s cubic-bezier(0.22,1,0.36,1) both;}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.panel-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;}
.panel-action{font-size:11px;color:var(--cyan);cursor:pointer;}
.chart-full{width:100%;height:280px;}

.data-table{width:100%;border-collapse:collapse;}
.data-table th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);}
.data-table td{padding:11px 12px;font-size:13px;border-bottom:1px solid rgba(26,45,74,.5);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:rgba(0,229,255,.03);}
.product-thumb{width:34px;height:34px;border-radius:7px;object-fit:cover;}
.badge-status{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;}
.badge-active{background:rgba(0,245,160,.12);color:var(--green);}
.badge-pending{background:rgba(255,124,58,.12);color:var(--orange);}
.badge-inactive{background:rgba(255,77,143,.12);color:var(--pink);}

.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;}
.prod-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:pointer;animation:slideUp .45s cubic-bezier(0.22,1,0.36,1) both;}
.prod-card:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(0,229,255,.08);}
.prod-card img{width:100%;height:130px;object-fit:cover;display:block;}
.prod-info{padding:11px;}
.prod-name{font-family:'Syne',sans-serif;font-size:12.5px;font-weight:600;margin-bottom:3px;}
.prod-brand{font-size:11px;color:var(--muted);margin-bottom:5px;}
.prod-price{font-size:15px;font-weight:700;color:var(--cyan);}
.prod-foot{display:flex;align-items:center;justify-content:space-between;margin-top:7px;}
.prod-btn{background:rgba(0,229,255,.1);color:var(--cyan);border:1px solid rgba(0,229,255,.2);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;transition:all .2s;}
.prod-btn:hover{background:rgba(0,229,255,.2);}

.customer-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(26,45,74,.5);}
.customer-row:last-child{border-bottom:none;}
.cust-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
.cust-info{flex:1;}
.cust-name{font-size:13px;font-weight:500;}
.cust-email{font-size:11px;color:var(--muted);}
.cust-spend{font-weight:700;font-size:13px;color:var(--green);}

.analytics-top{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:24px;}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;animation:slideUp .55s cubic-bezier(0.22,1,0.36,1) both;}
.metric-card:nth-child(1){animation-delay:.05s;} .metric-card:nth-child(2){animation-delay:.12s;} .metric-card:nth-child(3){animation-delay:.19s;}
.metric-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.metric-big{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;}
.metric-sub{font-size:12px;color:var(--muted);margin-top:6px;}
.progress-bar{height:6px;background:var(--border);border-radius:10px;margin-top:10px;overflow:hidden;}
.progress-fill{height:100%;border-radius:10px;transition:width 1s ease;}

.sales-filter{display:flex;gap:8px;margin-bottom:20px;}
.filter-btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;}
.filter-btn.active,.filter-btn:hover{background:rgba(0,229,255,.1);color:var(--cyan);border-color:rgba(0,229,255,.3);}

.legend{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.legend-label{color:var(--muted);}
.legend-val{margin-left:auto;font-weight:600;font-size:12px;}

@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.page-section{animation:fadeIn .25s ease;}
/* stagger panel rows */
.row-2 .panel:nth-child(1){animation-delay:.28s;}
.row-2 .panel:nth-child(2){animation-delay:.38s;}
.row-3 .panel:nth-child(1){animation-delay:.30s;}
.row-3 .panel:nth-child(2){animation-delay:.38s;}
.row-3 .panel:nth-child(3){animation-delay:.46s;}

canvas{
  width:100% !important;
  height:280px !important;
}
#catChart, #devChart, #hrChart, #brdChart, #trafChart {
  height:200px !important;
}

</style>
</head>

function ri(a,b){return Math.floor(rnd()*(b-a+1))+a;}

function countUp(){
  document.querySelectorAll('.stat-val[data-target]').forEach(el=>{
    const raw=el.dataset.target;
    const prefix=raw.match(/^[^0-9]*/)[0];
    const suffix=raw.match(/[^0-9.KkMm]*$/)[0];
    const numStr=raw.replace(prefix,'').replace(suffix,'');
    const isFloat=numStr.includes('.');
    const isSuffixed=/[KkMm]/.test(numStr);
    const num=parseFloat(numStr.replace(/[KkMm]/,''));
    const sfx=isSuffixed?numStr.match(/[KkMm]/)[0]:'';
    const dur=1100,steps=50,interval=dur/steps;
    let step=0;
    const timer=setInterval(()=>{
      step++;
      const progress=step/steps;
      const ease=1-Math.pow(1-progress,3);
      const cur=num*ease;
      el.textContent=prefix+(isFloat||isSuffixed?cur.toFixed(1):Math.floor(cur))+sfx+suffix;
      if(step>=steps){el.textContent=prefix+numStr+suffix;clearInterval(timer);}
    },interval);
  });
}

  mkChart('saleChart',{type:'bar',data:{labels,datasets:top5.map((p,i)=>{seed=p.id*(isM?13:17);return{label:p.name,data:labels.map(()=>ri(isM?2:20,isM?50:350)),backgroundColor:fCols[i],borderColor:cols[i],borderWidth:1.5,borderRadius:4};})},options:{responsive:false,maintainAspectRatio:true,animation:{duration:1200,easing:'easeOutQuart'},plugins:{legend:{labels:{color:'#5a7298',boxWidth:10}}},scales:{x:{grid:{display:false},ticks:tickC},y:{grid:gridC,ticks:tickC}}}});
}

function chartCust(){
  mkChart('spChart',{type:'bar',data:{labels:customers.map(c=>c.name.split(' ')[0]),datasets:[{data:customers.map(c=>c.spent),backgroundColor:CC.cf,borderColor:CC.c,borderWidth:1.5,borderRadius:6}]},options:{responsive:false,maintainAspectRatio:true,animation:{duration:1200,easing:'easeOutQuart'},plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:tickC},y:{grid:gridC,ticks:{...tickC,callback:v=>'$'+v}}}}});
  mkChart('orChart',{type:'radar',data:{labels:customers.map(c=>c.name.split(' ')[0]),datasets:[{label:'Orders',data:customers.map(c=>c.orders),borderColor:CC.v,backgroundColor:CC.vf,pointBackgroundColor:CC.v,pointRadius:3}]},options:{responsive:false,maintainAspectRatio:true,animation:{duration:1400,easing:'easeOutQuart'},plugins:{legend:{display:false}},scales:{r:{grid:{color:'#1a2d4a'},ticks:{color:'#5a7298',backdropColor:'transparent',stepSize:5}}}}});
}

render();
</script>
</body>
</html>
