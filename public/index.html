<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAPRS Ecommerce</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0f172a;
color:white;
}

.center{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
padding:40px;
border-radius:18px;
width:420px;
box-shadow:0 0 25px rgba(0,255,255,0.6);
text-align:center;
}

h1{color:#7ef9ff;}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.2);
color:white;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:linear-gradient(90deg,#7ef9ff,#916eff);
cursor:pointer;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#020617;
}

.logo{
font-size:20px;
font-weight:600;
color:#7ef9ff;
}

.search{
padding:8px 15px;
border-radius:20px;
border:none;
width:300px;
}

.logout{
background:#ff4b5c;
color:white;
padding:8px 15px;
border-radius:20px;
}

.container{padding:40px;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.product{
background:#1e293b;
padding:15px;
border-radius:10px;
}

.product img{
width:100%;
border-radius:8px;
}

.price{
color:#33fc98;
font-weight:600;
}

.desc{
font-size:13px;
opacity:0.9;
}

</style>
</head>

<body>

<div id="app"></div>

<script>

let page="login"
let filteredProducts=[]

function go(p){
page=p
render()
}

/* PRODUCT DATA */

const productImages = [

"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9", // Smartphone

"https://images.unsplash.com/photo-1580894908361-967195033215"  // Portable SSD

]

const names=[
"Smartphone","Laptop","Headphones","Keyboard","Mouse",
"Camera","Smart Watch","Speaker","Tablet","Drone",
"SSD","Monitor","Router","Microphone","Webcam",
"Tripod","Projector","Hard Drive","Smart TV","Power Bank",
"Gaming Chair","Cooling Pad","Desk Lamp","Stylus Pen","Graphics Tablet",
"Mini PC","USB Hub","HDMI Switch","Smart Lock","Security Camera",
"Electric Scooter","Car Dashcam","Wireless Charger","Bluetooth Adapter","Smart Plug",
"VR Headset","VR Controller","Portable Speaker","Laptop Stand","Smart Ring",
"Fitness Band","Portable Monitor","LED Light Strip","Stream Deck","Thermostat",
"Gaming Controller","Smart Bulb","Action Camera","Noise Headphones","Portable SSD"
]

const brands=["Apple","Samsung","Sony","Logitech","Dell","HP","Lenovo","Asus","Acer","Xiaomi"]
const colors=["Black","Silver","Blue","Red","White","Gray","Green","Gold"]
const sizes=["Small","Medium","Large","Compact","Slim","XL"]

const products=[]

for(let i=0;i<50;i++){
products.push({
name:names[i],
brand:brands[i%brands.length],
price:Math.floor(Math.random()*900+100),
color:colors[i%colors.length],
size:sizes[i%sizes.length],
features:"High performance, durable build, latest technology",
image:productImages[i]
})
}

filteredProducts=[...products]

function searchProducts(value){

value=value.toLowerCase()

filteredProducts=products.filter(p=>
p.name.toLowerCase().includes(value)||
p.brand.toLowerCase().includes(value)||
p.color.toLowerCase().includes(value)
)

displayProducts()
}

function displayProducts(){

let html=""

filteredProducts.forEach(p=>{

html+=`

<div class="product">

<img src="${p.image}">

<h3>${p.name}</h3>

<div class="desc">
Brand: ${p.brand}<br>
Color: ${p.color}<br>
Size: ${p.size}<br>
Features: ${p.features}
</div>

<p class="price">$${p.price}</p>

</div>

`

})

document.querySelector(".products").innerHTML=html

}

function render(){

let html=""

if(page==="login"){

html=`
<div class="center">
<div class="card">

<h1>MAPRS Ecommerce</h1>

<input placeholder="Email">
<input placeholder="Password" type="password">

<button onclick="go('home')">Login</button>

<p onclick="go('register')" style="cursor:pointer;color:#7ef9ff">
Create Account
</p>

</div>
</div>
`
}

else if(page==="register"){

html=`
<div class="center">
<div class="card">

<h1>Register</h1>

<input placeholder="Name">
<input placeholder="Email">
<input placeholder="Password">

<button onclick="registerUser()">Register</button>

<p onclick="go('login')" style="cursor:pointer;color:#7ef9ff">
Back to Login
</p>

</div>
</div>
`
}

else if(page==="home"){

html=`

<div class="navbar">

<div class="logo">MAPRS Ecommerce</div>

<input class="search" placeholder="Search products..." onkeyup="searchProducts(this.value)">

<button class="logout" onclick="go('login')">Logout</button>

</div>

<div class="container">

<h2>Products (50 Items)</h2>

<div class="products"></div>

</div>
`
}

document.getElementById("app").innerHTML=html

if(page==="home"){
displayProducts()
}

}

function registerUser(){
alert("Registration Successful")
go("login")
}

render()

</script>

</body>
</html>
